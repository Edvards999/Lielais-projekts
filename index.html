<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<title>Dzimšanas dienas slavenības</title>
</head>
<body>
<div class="augsa">
  <h1>Kādiem slaveniem cilvēki ir tava dzimšanas dienā?</h1>
</div>





<div class="alert">
  <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span> 
  <strong>Uzmanību!</strong> Pirms lieto mājaslapu, iepazīsties ar noteikumiem  <a href="noteikumi.html">Spied šiet lai skātitu tos</a>
</div>
<div class="container">
  <div class="box">
    <h1>Ievadiet savu dzimšanas datumu, lai noskaidrotu, ar kuru slavenību tas sakrīt:</h1>
    <div class="form-row">
      <label for="month">Ievadi mēnesi:</label>
      <select id="month">
        <option value="1">Janvāris</option>
        <option value="2">Februāris</option>
        <option value="3">Marts</option>
        <option value="4">Aprīlis</option>
        <option value="5">Maijs</option>
        <option value="6">Jūnijs</option>
        <option value="7">Jūlijs</option>
        <option value="8">Augusts</option>
        <option value="9">Septembris</option>
        <option value="10">Oktobris</option>
        <option value="11">Novembris</option>
        <option value="12">Decembris</option>
      </select>
      <label for="day">Ievadi datumu:</label>
      <select id="day"></select>
    </div>
    <button id="submitBtn">Iesniegt</button>
  </div>
</div>


<h2>Pazīstamas personības</h2>
<div class="peronibas">
  <div class="parent">
    <p>4. Novembris</p>
  <img src="Pdiddy.jpg">
  </div>
  <div class="parent">
    <p>20. Aprīlis</p>
  <img src="personiba2.jpg">
  </div>
  <div class="parent">
    <p>21. Februāris</p>
  <img src="personiba3.jpg">
  </div>
  <div class="parent">
    <p>4. Septembris</p>
  <img src="Karlis_Ulmanis.jpg">
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
